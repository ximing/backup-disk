name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build
        env:
          GOARCH: ${{ matrix.arch }}
        run: |
          go build -ldflags "-s -w -X main.version=${{ github.ref_name }}" -o cloudsync ./cmd/cloudsync

      - name: Package
        run: |
          mkdir -p dist
          tar -czf dist/cloudsync-linux-${{ matrix.arch }}.tar.gz cloudsync README.md

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloudsync-linux-${{ matrix.arch }}
          path: dist/*

  build-darwin:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build
        env:
          GOARCH: ${{ matrix.arch }}
        run: |
          go build -ldflags "-s -w -X main.version=${{ github.ref_name }}" -o cloudsync ./cmd/cloudsync

      - name: Package
        run: |
          mkdir -p dist
          tar -czf dist/cloudsync-darwin-${{ matrix.arch }}.tar.gz cloudsync README.md

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloudsync-darwin-${{ matrix.arch }}
          path: dist/*

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build
        run: |
          go build -ldflags "-s -w -X main.version=${{ github.ref_name }}" -o cloudsync.exe ./cmd/cloudsync

      - name: Package
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Compress-Archive -Path cloudsync.exe,README.md -DestinationPath dist/cloudsync-windows-amd64.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloudsync-windows-amd64
          path: dist/*

  release:
    needs: [build-linux, build-darwin, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: cloudsync-*
          merge-multiple: true

      - name: Generate Changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s" --no-merges)
          else
            CHANGELOG=$(git log --pretty=format:"- %s" --no-merges ${PREV_TAG}..HEAD)
          fi
          {
            echo "changelog<<EOF"
            echo "$CHANGELOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Compute Checksums
        run: |
          cd artifacts
          for f in cloudsync-*; do
            sha256sum "$f" >> checksums.txt
          done
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ## 变更日志

            ${{ steps.changelog.outputs.changelog }}

            ## 安装

            ### macOS (Intel)
            ```bash
            curl -L -o cloudsync.tar.gz https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/cloudsync-darwin-amd64.tar.gz
            tar -xzf cloudsync.tar.gz
            ```

            ### macOS (Apple Silicon)
            ```bash
            curl -L -o cloudsync.tar.gz https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/cloudsync-darwin-arm64.tar.gz
            tar -xzf cloudsync.tar.gz
            ```

            ### Linux (AMD64)
            ```bash
            curl -L -o cloudsync.tar.gz https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/cloudsync-linux-amd64.tar.gz
            tar -xzf cloudsync.tar.gz
            ```

            ### Linux (ARM64)
            ```bash
            curl -L -o cloudsync.tar.gz https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/cloudsync-linux-arm64.tar.gz
            tar -xzf cloudsync.tar.gz
            ```

            ### Windows (AMD64)
            下载 `cloudsync-windows-amd64.zip` 并解压。

            ## 校验和

            见 checksums.txt
          files: artifacts/*
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
