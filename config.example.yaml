# CloudSync CLI 配置文件示例
# 完整配置说明文档: https://github.com/ximing/cloudsync/blob/main/README.md
#
# 配置文件路径: ~/.cloudsync/config.yaml
# 支持环境变量替换: ${VAR_NAME} 或 ${VAR_NAME:-default_value}
#
# 日期格式占位符说明:
#   YYYY - 年 (4位)        MM - 月 (01-12)        DD - 日 (01-31)
#   YY   - 年 (2位)        HH - 时 (00-23)        mm - 分 (00-59)
#   ss   - 秒 (00-59)
#
# 示例:
#   "YYYY/MM/DD/HHmmss"  ->  2024/03/15/143022
#   "YYYY-MM-DD"         ->  2024-03-15
#   "YYYYMMDD_HHmmss"    ->  20240315_143022

# =============================================================================
# 全局配置
# =============================================================================
global:
  # 日志级别: debug, info, warn, error (默认: info)
  log_level: info

  # 日志格式: text, json (默认: text)
  log_format: text

  # 最大重试次数 (默认: 3)
  max_retries: 3

# =============================================================================
# 存储后端配置
# =============================================================================
# 支持类型: s3 (AWS S3 或兼容服务), oss (阿里云 OSS)
#
# 注意: 敏感信息建议使用环境变量
# export AWS_ACCESS_KEY_ID=your_access_key
# export AWS_SECRET_ACCESS_KEY=your_secret_key
# export OSS_ACCESS_KEY_ID=your_access_key
# export OSS_ACCESS_KEY_SECRET=your_access_key_secret

storage:
  # 存储类型: s3 或 oss
  type: s3

  # --- AWS S3 配置 ---
  s3:
    # AWS 区域
    region: us-east-1

    # S3 Bucket 名称
    bucket: my-backup-bucket

    # 访问密钥 (推荐使用环境变量)
    access_key: ${AWS_ACCESS_KEY_ID}
    secret_key: ${AWS_SECRET_ACCESS_KEY}

    # 服务端加密 (可选): AES256, aws:kms
    encryption: AES256

    # 自定义端点 (用于 S3 兼容服务，如 MinIO)
    # endpoint: http://localhost:9000

  # --- 阿里云 OSS 配置 ---
  # 如果 type 为 oss，请配置以下参数
  # oss:
  #   # OSS 端点
  #   endpoint: oss-cn-beijing.aliyuncs.com
  #
  #   # Bucket 名称
  #   bucket: my-backup-bucket
  #
  #   # 访问密钥 (推荐使用环境变量)
  #   access_key_id: ${OSS_ACCESS_KEY_ID}
  #   access_key_secret: ${OSS_ACCESS_KEY_SECRET}

# =============================================================================
# 全局保留策略 (可被任务级别配置覆盖)
# =============================================================================
retention:
  # 最大保留天数 (0 表示不限制)
  max_days: 30

  # 最大版本数量 (0 表示不限制)
  max_versions: 10

# =============================================================================
# 全局通知配置 (可被任务级别配置覆盖)
# =============================================================================
notify:
  # 是否启用通知
  enabled: false

  # MeoW 推送 API 地址
  api_url: https://api.meow.example.com/push

  # 消息类型: text, html, markdown
  msg_type: html

  # HTML 消息高度 (当 msg_type 为 html 时有效)
  html_height: 350

# =============================================================================
# 同步任务配置
# 可以配置多个任务，每个任务独立调度和执行
# =============================================================================
tasks:
  # ---------------------------------------------------------------------------
  # 任务 1: 文档备份 (每天凌晨 2 点执行)
  # ---------------------------------------------------------------------------
  - name: documents-backup

    # Cron 表达式 (5 字段: 分 时 日 月 周)
    # 示例:
    #   "0 2 * * *"     - 每天凌晨 2:00
    #   "0 */6 * * *"   - 每 6 小时
    #   "0 3 * * 1"     - 每周一凌晨 3:00
    #   "@daily"        - 每天 0:00 (预设别名)
    #   "@hourly"       - 每小时 (预设别名)
    schedule: "0 2 * * *"

    # 源目录配置
    source:
      # 本地路径 (绝对路径)
      path: /home/user/Documents

      # 包含规则 (glob 模式，可选)
      # 如果指定，只匹配这些模式的文件
      include:
        - "**/*.pdf"
        - "**/*.docx"
        - "**/*.xlsx"
        - "**/*.txt"
        - "**/*.md"

      # 排除规则 (glob 模式，可选)
      # 匹配的文件会被跳过
      exclude:
        - "**/temp/**"
        - "**/tmp/**"
        - "**/.git/**"
        - "**/node_modules/**"
        - "**/*.log"

    # 目标存储配置
    target:
      # 云端前缀路径
      prefix: backups/documents

      # 日期格式 (可选)
      # 实际路径: {prefix}/{date_format}/{filename}
      # 默认: "YYYY/MM/DD/HHmmss"
      date_format: "YYYY/MM/DD/HHmmss"

    # 压缩配置 (可选)
    compression:
      # 是否启用压缩
      enabled: true

      # 压缩算法: gzip, zstd
      # zstd 压缩率更高、速度更快，推荐
      type: zstd

      # 压缩模式: file (单文件) 或 archive (打包)
      # file   - 每个文件单独压缩，保留目录结构
      # archive - 所有文件打包成一个压缩包 (tar.gz/tar.zst)
      mode: file

      # 压缩级别 (1-9，数字越大压缩率越高但越慢)
      level: 3

      # === file 模式专用配置 ===
      # 最小压缩文件大小 (字节)
      # 小于此大小的文件不压缩
      min_size: 1024

      # 仅压缩指定扩展名 (可选)
      # include_extensions:
      #   - ".txt"
      #   - ".log"

      # 排除指定扩展名 (可选)
      exclude_extensions:
        - ".zip"
        - ".gz"
        - ".zst"
        - ".jpg"
        - ".png"
        - ".mp4"

      # === archive 模式专用配置 ===
      # 压缩包文件名 (不含扩展名)
      # 默认: {task_name}_{timestamp}
      # archive_name: "my-backup"

    # 任务级保留策略 (可选，覆盖全局配置)
    retention:
      max_days: 30
      max_versions: 10

    # 任务级通知设置 (可选，覆盖全局配置)
    notify:
      # 通知级别: always, on-error, never
      enabled: on-error

  # ---------------------------------------------------------------------------
  # 任务 2: 代码备份 (每小时执行)
  # ---------------------------------------------------------------------------
  - name: code-backup
    schedule: "0 * * * *"

    source:
      path: /home/user/Projects
      exclude:
        - "**/node_modules/**"
        - "**/.git/**"
        - "**/vendor/**"
        - "**/dist/**"
        - "**/build/**"
        - "**/*.exe"
        - "**/*.dll"
        - "**/*.so"

    target:
      prefix: backups/code

    compression:
      enabled: true
      type: gzip
      level: 6
      min_size: 512
      exclude_extensions:
        - ".zip"
        - ".tar.gz"

    retention:
      max_days: 7
      max_versions: 5

    notify:
      enabled: always

  # ---------------------------------------------------------------------------
  # 任务 3: 数据库备份 (每天 3 点，使用预设别名)
  # ---------------------------------------------------------------------------
  - name: database-backup
    schedule: "@daily"

    source:
      path: /var/backups/mysql
      include:
        - "*.sql"
        - "*.sql.gz"

    target:
      prefix: backups/database
      date_format: "YYYY-MM-DD"

    compression:
      enabled: false  # 数据库已压缩

    retention:
      max_days: 90
      max_versions: 30

    notify:
      enabled: on-error

  # ---------------------------------------------------------------------------
  # 任务 4: 照片备份 (每周执行，无压缩)
  # ---------------------------------------------------------------------------
  - name: photos-backup
    schedule: "0 4 * * 0"  # 每周日凌晨 4 点

    source:
      path: /home/user/Pictures
      include:
        - "**/*.jpg"
        - "**/*.jpeg"
        - "**/*.png"
        - "**/*.raw"
        - "**/*.cr2"
        - "**/*.nef"

    target:
      prefix: backups/photos

    # 照片已经是压缩格式，跳过压缩
    compression:
      enabled: false

    retention:
      max_days: 365
      max_versions: 52  # 保留 52 周

  # ---------------------------------------------------------------------------
  # 任务 5: 项目打包备份 (每天 1 点，打包压缩模式)
  # ---------------------------------------------------------------------------
  - name: projects-archive
    schedule: "0 1 * * *"  # 每天凌晨 1 点

    source:
      path: /home/user/Projects
      exclude:
        - "**/node_modules/**"
        - "**/.git/**"
        - "**/vendor/**"
        - "**/dist/**"
        - "**/build/**"

    target:
      prefix: archives/projects
      date_format: "YYYY-MM-DD"

    # 打包压缩模式：所有文件打包成一个 tar.zst 文件
    compression:
      enabled: true
      type: zstd
      mode: archive           # 打包模式
      level: 5                # 较高压缩率
      archive_name: "projects" # 压缩包名称: projects.tar.zst

    retention:
      max_days: 30
      max_versions: 7         # 保留 7 个版本

    notify:
      enabled: always

# =============================================================================
# 配置验证
# =============================================================================
# 保存配置后，运行以下命令验证:
#
#   cloudsync validate
#
# 启动守护进程:
#
#   cloudsync daemon start
#
# 手动执行测试:
#
#   cloudsync sync documents-backup --dry-run
#
# 查看状态:
#
#   cloudsync status
#   cloudsync logs documents-backup
